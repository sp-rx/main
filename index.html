<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kiara Optom Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body{
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
  background:#d1d1d1;
  font-size:12px;
}

/* Container */
.container{
  width:90%;
  max-width:580px;
  margin:20px auto 40px auto;
}

/* Title */
h1{
  text-align:center;
  font-size:20px;
  font-weight:300;
  margin-bottom:25px;
  color:#2b2b2b;
}

/* Grid */
.button-grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:12px;
}

/* Buttons */
a.button{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  text-decoration:none;
  background:#f1f1f1;
  border:1px solid #2b2b2b;
  color:#2b2b2b;

  padding:15px;
  text-align:center;
  font-size:10px;
  border-radius:12px;
  width: auto;
  height:auto;
  margin-top:30px;
}

/* Image */
a.button img{
  width:150px;
  height:150px;
  object-fit:contain; /* keeps full image, no crop */
}
</style>
</head>

<body>

<div class="container">
  <div style="height:80px"></div>
  <h1>Kiara Optometry Tools</h1>

  <div class="button-grid">

    <a class="button" href="https://sp-rx.github.io/CL-SELECTOR/" target="_blank">
      <img src="img/cl.png">
      Contact Lens Selector
    </a>

    <a class="button" href="https://sp-rx.github.io/rod/" target="_blank">
      <img src="img/rod.png">
      Rodenstock Lens Selector
    </a>
    
    <a class="button" href="https://sp-rx.github.io/OL-selector/" target="_blank">
      <img src="img/ol.png">
      Ophthalmic Lens Selector
    </a>

    <a class="button" href="https://sp-rx.github.io/super_rx/" target="_blank">
      <img src="img/exam.png">
      SP-RX Eye Exam
    </a>

    <a class="button" href="https://sp-rx.github.io/mobile_FCDC/" target="_blank">
      <img src="img/add.png">
      Add Calculator
    </a>

    <a class="button" href="https://sp-rx.github.io/acuvue_astig_rotator/" target="_blank">
      <img src="img/astig.png">
      Astig Rotator
    </a>

    <a class="button" href="https://sp-rx.github.io/trainer_light/" target="_blank">
      <img src="img/visual.png">
      Visualizer
    </a>

    <a class="button" href="https://sp-rx.github.io/shop_sop/" target="_blank">
      <img src="img/sop.png">
      Shop SOP
    </a>

    <a class="button" href="https://sp-rx.github.io/Trainer/" target="_blank">
      <img src="img/trainer.png">
      RX Trainer
    </a>

  </div>
</div>

<div style="height:100px"></div>

</body>
</html>
